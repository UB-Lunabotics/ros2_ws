ekf_filter_node:
  ros__parameters:
    use_sim_time: false

    # Coordinate frames
    world_frame: odom
    odom_frame: odom
    base_link_frame: base_link
    map_frame: map

    # Publish the odom->base_link transform
    publish_tf: true
    publish_acceleration: false

    # Frequency
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true

    # -------------------------------------------------------------------------
    # Wheel odometry from ESP32
    # -------------------------------------------------------------------------
    odom0: /wheel_odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # -------------------------------------------------------------------------
    # IMU from ZED2i front camera
    # -------------------------------------------------------------------------
    imu0: imu0: /zed_front/zed_node/imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true

    # Process noise covariance

# =============================================================================
# rtabmap_params.yaml
# RTAB-Map config for simulated RGB-D rover
# Tuned for Gazebo Fortress, ROS2 Humble
# Odometry: EKF-filtered (/odometry/filtered) — NOT raw wheel odom
# Sensors: RGB-D camera (/camera/color/*), IMU via EKF
# =============================================================================

rtabmap:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Frames
    # -------------------------------------------------------------------------
    frame_id:        base_link
    odom_frame_id:   odom
    map_frame_id:    map

    # RTAB-Map publishes map->odom only.
    # Zed_noise owns odom->base_link — do NOT let RTAB-Map publish that.
    publish_tf:      true        # map->odom TF
    tf_delay:        0.05
    tf_tolerance:    0.1
    wait_for_transform: 0.2

    # -------------------------------------------------------------------------
    # Topic remappings (set in your launch file, listed here for reference)
    #
    #   /odom             -> /odometry/filtered   (EKF output, not raw wheels)
    #   /rgb/image        -> /camera/color/image
    #   /rgb/camera_info  -> /camera/color/camera_info
    #   /depth/image      -> /camera/color/depth_image
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # Subscriptions
    # No lidar in this setup — depth camera handles both loop closure and grid.
    # No visual odometry — EKF provides odom externally.
    # -------------------------------------------------------------------------
    subscribe_depth:      true
    subscribe_rgb:        true
    subscribe_scan:       false
    subscribe_scan_cloud: false   # no lidar pointcloud
    subscribe_stereo:     false
    subscribe_rgbd:       false
    subscribe_odom_info:  false   # no visual odom info topic

    # -------------------------------------------------------------------------
    # Detection / timing
    # -------------------------------------------------------------------------
    Rtabmap/DetectionRate: "2"    # Hz — 1 is plenty for mapping, saves CPU
    Rtabmap/TimeThr:       "0"    # no per-iteration time limit

    # -------------------------------------------------------------------------
    # Memory
    # -------------------------------------------------------------------------
    Mem/IncrementalMemory:     "true"   # SLAM mode (false = localization only)
    Mem/InitWMWithAllNodes:    "false"
    Mem/STMSize:               "20"     # short-term memory window
    Mem/RehearsalSimilarity:   "0.45"
    Mem/BadSignaturesIgnored:  "true"

    # -------------------------------------------------------------------------
    # Loop closure
    # Capped at 10 m to prevent bad cross-map jumps with no visual odom anchor
    # -------------------------------------------------------------------------
    Rtabmap/LoopRatio:                  "0"
    RGBD/LoopClosureReactivation:       "true"
    RGBD/MaxLoopClosureDistance:        "6.0"  # was 0 (unlimited) — risky without visual odom

    # Local loop closure (nearby graph nodes)
    RGBD/LocalRadius:               "4.0"       # metres
    RGBD/LocalImmunizationRatio:    "0.5"

    # Proximity detection (space-based loop closure)
    RGBD/ProximityBySpace:          "true"
    RGBD/ProximityMaxGraphDepth:    "0"
    RGBD/ProximityPathMaxNeighbors: "1"

    # -------------------------------------------------------------------------
    # Occupancy grid — built from depth camera (no lidar)
    # -------------------------------------------------------------------------
    Grid/Sensor:              "1"      # 1 = depth camera (was using lidar setting)
    Grid/RangeMax:            "4.0"    # match cloud_max_depth
    Grid/CellSize:            "0.05"   # 5 cm resolution
    Grid/ClusterRadius:       "0.1"
    Grid/GroundIsObstacle:    "false"
    Grid/NormalsSegmentation: "false"  # flat sim ground, skip normal estimation
    Grid/FootprintRadius:     "0.55"   # robot inscribed radius, clears self-hits
    Grid/MaxObstacleHeight:    "0.5"    # cap at 50cm — rocks are 30-40cm,
                                       # prevents ceiling/noise hits inflating grid
    Grid/MinClusterSize:       "5"      # ignore single-cell noise from depth camera
    Grid/RayTracing:           "true"   # better free-space carving around craters
    Grid/RangeMin:             "0.3"    # ensures rocks right in front register

    # -------------------------------------------------------------------------
    # 3D point cloud map (RViz visualisation)
    # -------------------------------------------------------------------------
    cloud_decimation:  4       # keep 1 in 4 points — saves memory
    cloud_max_depth:   4.0     # metres — matches ZED2i reliable range in sim
    cloud_min_depth:   0.2
    cloud_voxel_size:  0.05

    # -------------------------------------------------------------------------
    # Map publishing
    # -------------------------------------------------------------------------
    map_always_update:    false
    map_empty_ray_tracing: true
    map_filter_radius:    0.0
    map_filter_angle:     30.0
    map_cleanup:          true

    # -------------------------------------------------------------------------
    # Visual appearance-based loop closure
    # GFTT/BRIEF (type 9) is fast and works well in structured sim environments
    # -------------------------------------------------------------------------
    Vis/MinInliers:       "10"
    Vis/MaxFeatures:      "600"
    Vis/FeatureType:      "9"      # GFTT/BRIEF
    Vis/InlierDistance:   "0.1"
    Vis/EstimationType:   "1"      # 1 = PnP

    # -------------------------------------------------------------------------
    # ICP refinement (depth-based loop closure geometry check)
    # -------------------------------------------------------------------------
    Icp/MaxTranslation: "1.0"
    Icp/MaxRotation:    "0.78"     # ~45 deg
    Icp/VoxelSize:      "0.05"
    Icp/Iterations:     "30"
    Icp/PointToPlane:   "false"    # no normals from depth camera in 2D mode

    # -------------------------------------------------------------------------
    # Logging — set to 0 for release, 4 for debug
    # -------------------------------------------------------------------------
    log_to_rosout_level: 4